name: Sync Upstream & Auto Release

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:        # 也支持手动触发

permissions:
  contents: write

jobs:
  sync-and-release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出自己的 fork ──────────────────────────────────────────
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0          # 需要完整历史来做 diff
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. 添加 upstream 并拉取 ────────────────────────────────────
      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/boomker/rime-fast-xhup.git
          git fetch upstream main

      # ── 3. 同步 upstream → fork main ──────────────────────────────
      - name: Sync fork with upstream
        id: sync
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "✅ Already up to date, nothing to do."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git merge --ff-only upstream/main || git merge upstream/main -m "chore: sync upstream"
            git push origin main
            echo "already_up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "NEW_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. 判断是否需要发 Release ──────────────────────────────────
      - name: Check if release needed
        id: check
        if: steps.sync.outputs.already_up_to_date == 'false'
        run: |
          # 取最新 tag（若无则从初始提交开始）
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "need_release=true" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG=首次自动发布，包含 upstream 全部提交。" >> "$GITHUB_OUTPUT"
          else
            DIFF_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
            if [ "$DIFF_COUNT" -gt 0 ]; then
              echo "need_release=true" >> "$GITHUB_OUTPUT"
              # 生成 changelog：取 upstream 作者的提交（排除 bot 的词库自动更新）
              CHANGELOG=$(git log "${LAST_TAG}..HEAD" \
                --no-merges \
                --author="boomker" \
                --pretty=format:"- %s (%ad)" \
                --date=short)
              # 若 boomker 无提交，则列出所有
              if [ -z "$CHANGELOG" ]; then
                CHANGELOG=$(git log "${LAST_TAG}..HEAD" \
                  --no-merges \
                  --pretty=format:"- %s (%ad)" \
                  --date=short \
                  | head -20)
              fi
              # 写入多行环境变量
              {
                echo "CHANGELOG<<EOF"
                echo "$CHANGELOG"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            else
              echo "need_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── 5. 生成版本号并发 Release ──────────────────────────────────
      - name: Create Release
        if: steps.check.outputs.need_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y%m%d%H%M')"
          TITLE="Auto Release ${TAG} (synced from upstream)"

          BODY="## 与上个版本的变更\n\n${{ steps.check.outputs.CHANGELOG }}\n\n---\n_由 GitHub Actions 自动同步自 [boomker/rime-fast-xhup](https://github.com/boomker/rime-fast-xhup)_"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$(printf "$BODY")" \
            --latest
